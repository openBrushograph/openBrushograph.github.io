<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brushograph Drone & Draw</title>
    <style>
        :root {
            --bg-color: #0d0d12;
            --panel-bg: #1a1a24;
            --text-color: #e0e0e0;
            --accent-pink: #FF007F;
            --accent-green: #39FF14;
            --accent-blue: #00f3ff;
            --font-main: 'Courier New', Courier, monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--accent-pink);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
            margin-bottom: 20px;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--accent-blue);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.1);
        }

        .panel h2 {
            color: var(--accent-green);
            margin-top: 0;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        /* Inputs & Buttons */
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }

        input[type="text"], input[type="number"] {
            background-color: #000;
            border: 1px solid #555;
            color: var(--accent-green);
            padding: 10px;
            font-family: var(--font-main);
            border-radius: 4px;
        }

        button {
            background-color: transparent;
            border: 2px solid var(--accent-pink);
            color: var(--accent-pink);
            padding: 10px 20px;
            cursor: pointer;
            font-family: var(--font-main);
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 4px;
            transition: all 0.2s;
        }

        button:hover, button.active {
            background-color: var(--accent-pink);
            color: #000;
            box-shadow: 0 0 10px var(--accent-pink);
        }

        /* Drone Tracks */
        .drone-track {
            background: #000;
            border: 1px solid #333;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .drone-label {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--accent-blue);
            width: 30px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 24px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: #aaa;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent-green); }
        input:checked + .slider:before { transform: translateX(26px); background-color: #000; }

        .pitch-slider {
            flex-grow: 1;
            accent-color: var(--accent-pink);
        }

        .pitch-val {
            width: 60px;
            text-align: right;
            font-family: var(--font-main);
            color: var(--accent-pink);
        }

        /* Canvas Panel */
        .canvas-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        
        #xy-pad {
            background: #000;
            border: 1px solid var(--accent-blue);
            border-radius: 4px;
            cursor: crosshair;
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.1);
        }

        /* Console */
        .console-output {
            background-color: #000;
            border: 1px solid #333;
            height: 150px;
            overflow-y: auto;
            padding: 10px;
            font-size: 0.9rem;
            color: #ccc;
            margin-top: 20px;
        }
        
        .console-output .sent { color: var(--accent-green); }
        .console-output .error { color: var(--accent-pink); }
        .console-output .info { color: var(--accent-blue); }

        @media (max-width: 900px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <h1>Drone & Draw</h1>

    <div class="container">
        
        <!-- Controls & Drones -->
        <div class="panel">
            <h2>Connection & Setup</h2>
            <div class="input-group">
                <input type="text" id="ip-input" value="192.168.4.1" placeholder="IP Address" style="flex-grow: 1;">
                <button id="btn-ping">Ping</button>
            </div>
            
            <div class="input-group" style="border-top: 1px solid #333; padding-top: 15px;">
                <label style="color: var(--accent-blue);">Max X (mm):</label>
                <input type="number" id="max-x" value="100" style="width: 70px;">
                <label style="color: var(--accent-blue); margin-left: 10px;">Max Y (mm):</label>
                <input type="number" id="max-y" value="100" style="width: 70px;">
            </div>

            <h2 style="margin-top: 30px;">Drone Engines</h2>
            
            <div class="drone-track">
                <div class="drone-label">X</div>
                <label class="switch">
                    <input type="checkbox" id="drone-x-toggle">
                    <span class="slider"></span>
                </label>
                <input type="range" id="drone-x-pitch" class="pitch-slider" min="100" max="3000" value="600" step="50">
                <div class="pitch-val" id="drone-x-val">F600</div>
            </div>

            <div class="drone-track">
                <div class="drone-label">Y</div>
                <label class="switch">
                    <input type="checkbox" id="drone-y-toggle">
                    <span class="slider"></span>
                </label>
                <input type="range" id="drone-y-pitch" class="pitch-slider" min="100" max="3000" value="600" step="50">
                <div class="pitch-val" id="drone-y-val">F600</div>
            </div>

            <div class="drone-track">
                <div class="drone-label">Z</div>
                <label class="switch">
                    <input type="checkbox" id="drone-z-toggle">
                    <span class="slider"></span>
                </label>
                <input type="range" id="drone-z-pitch" class="pitch-slider" min="100" max="3000" value="600" step="50">
                <div class="pitch-val" id="drone-z-val">F600</div>
            </div>

            <button id="btn-stop" style="width: 100%; margin-top: 10px;">Emergency Stop (!)</button>
        </div>

        <!-- Drawing Pad -->
        <div class="panel">
            <h2>XY Drawing Pad</h2>
            <div class="canvas-container">
                <canvas id="xy-pad" width="400" height="400"></canvas>
                <div id="xy-status" style="color: var(--accent-pink); font-size: 0.9rem;">Click to move. Drones will pause during transit.</div>
            </div>

            <div class="console-output" id="console"></div>
        </div>

    </div>

    <script>
        const consoleEl = document.getElementById('console');
        const ipInput = document.getElementById('ip-input');
        
        let isDroning = false;
        let isMoving = false;
        const moveDist = '0.5';

        // --- Logging & Comms ---
        function log(msg, type = 'info') {
            const line = document.createElement('div');
            line.className = type;
            line.textContent = `> ${msg}`;
            consoleEl.appendChild(line);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        async function sendCommand(cmd) {
            const ip = ipInput.value.trim();
            if (!ip) return;
            const url = `http://${ip}/command?cmd=${encodeURIComponent(cmd + '\n')}`;
            try {
                await fetch(url, { method: 'GET', mode: 'no-cors', cache: 'no-store' });
            } catch (e) {
                console.error(e);
            }
        }

        // --- Drone Logic (Recursive Loop) ---
        const tracks = ['x', 'y', 'z'];
        
        // Update slider values visually
        tracks.forEach(axis => {
            document.getElementById(`drone-${axis}-pitch`).addEventListener('input', (e) => {
                document.getElementById(`drone-${axis}-val`).textContent = `F${e.target.value}`;
            });
            document.getElementById(`drone-${axis}-toggle`).addEventListener('change', () => {
                checkDroneState();
            });
        });

        function checkDroneState() {
            const anyActive = tracks.some(axis => document.getElementById(`drone-${axis}-toggle`).checked);
            if (anyActive && !isDroning && !isMoving) {
                isDroning = true;
                log('Drone Engines Started', 'info');
                droneLoop();
            } else if (!anyActive) {
                isDroning = false;
            }
        }

        async function droneLoop() {
            if (!isDroning || isMoving) return;

            // Gather active drones and pitches
            let gcodeLines = ['G91'];
            let hasActive = false;

            // To get distinct pitches, we send sequential moves per axis
            let fwdMoves = [];
            let bwdMoves = [];

            tracks.forEach(axis => {
                if (document.getElementById(`drone-${axis}-toggle`).checked) {
                    hasActive = true;
                    const pitch = document.getElementById(`drone-${axis}-pitch`).value;
                    const a = axis.toUpperCase();
                    fwdMoves.push(`G1 ${a}${moveDist} F${pitch}`);
                    bwdMoves.push(`G1 ${a}-${moveDist} F${pitch}`);
                }
            });

            if (hasActive) {
                gcodeLines.push(...fwdMoves, ...bwdMoves, 'G90');
                const gcode = gcodeLines.join('\n');
                
                await sendCommand(gcode);
                // Recursive loop. Wait enough time to avoid flooding ESP32 buffer.
                setTimeout(droneLoop, 250); 
            } else {
                isDroning = false;
            }
        }

        // --- XY Drawing Pad ---
        const canvas = document.getElementById('xy-pad');
        const ctx = canvas.getContext('2d');
        let currentX = 0;
        let currentY = 0;

        function drawPad() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Grid lines
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            for(let i=0; i<=canvas.width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Crosshair
            ctx.strokeStyle = '#39FF14';
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(currentX - 10, currentY); ctx.lineTo(currentX + 10, currentY); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(currentX, currentY - 10); ctx.lineTo(currentX, currentY + 10); ctx.stroke();
        }
        drawPad();

        canvas.addEventListener('mousedown', async (e) => {
            const rect = canvas.getBoundingClientRect();
            currentX = e.clientX - rect.left;
            currentY = e.clientY - rect.top;
            
            // Convert to machine coords
            const maxX = parseFloat(document.getElementById('max-x').value);
            const maxY = parseFloat(document.getElementById('max-y').value);
            
            // Invert Y because canvas 0,0 is top-left, but CNC 0,0 is usually bottom-left
            const machineX = (currentX / canvas.width) * maxX;
            const machineY = ((canvas.height - currentY) / canvas.height) * maxY;

            drawPad();

            // Conflict Resolution: Pause drone, move, resume
            isMoving = true;
            log(`Moving to X${machineX.toFixed(2)} Y${machineY.toFixed(2)}`, 'sent');
            
            // Absolute move command
            const moveCmd = `G90\nG1 X${machineX.toFixed(3)} Y${machineY.toFixed(3)} F1500`;
            await sendCommand(moveCmd);

            // Estimate travel time so we know when to resume drones (rough guess based on F1500)
            setTimeout(() => {
                isMoving = false;
                if (tracks.some(axis => document.getElementById(`drone-${axis}-toggle`).checked)) {
                    isDroning = true;
                    droneLoop(); // Resume drones
                }
            }, 1000); // Wait 1 second before resuming drones
        });

        document.getElementById('btn-stop').addEventListener('click', () => {
            isDroning = false;
            tracks.forEach(axis => document.getElementById(`drone-${axis}-toggle`).checked = false);
            sendCommand('!');
            log('Emergency Stop (!)', 'error');
        });

        document.getElementById('btn-ping').addEventListener('click', () => {
            log('Pinging controller...', 'info');
            sendCommand('?');
        });

    </script>
</body>
</html>
